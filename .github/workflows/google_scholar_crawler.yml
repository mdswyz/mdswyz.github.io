name: Update Google Scholar citations

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/google_scholar_crawler.yml"
      - "google_scholar_crawler/**"

permissions:
  contents: write

concurrency:
  group: google-scholar-citations
  cancel-in-progress: true

jobs:
  update:
    runs-on: macos-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Fetch citation data
        env:
          GOOGLE_SCHOLAR_ID: pgZc4sgAAAAJ
        run: python google_scholar_crawler/main.py

      - name: Publish citation data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd google_scholar_crawler/results
          git init
          git checkout -b google-scholar-stats
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gs_data.json gs_data_shieldsio.json
          git commit -m "Update Google Scholar citation data"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:google-scholar-stats --force
